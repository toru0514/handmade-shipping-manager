name: Poll Orders

on:
  schedule:
    # 毎時15分（UTC）に実行。日本時間では毎時15分。
    - cron: '15 * * * *'
  workflow_dispatch: # GitHub UI から手動実行も可能

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      browserless:
        image: ghcr.io/browserless/chromium:latest
        ports:
          - 3000:3000
        env:
          # サービスコンテナ内でのトークン認証を無効化
          TOKEN: ''
        options: >-
          --health-cmd "curl -f http://localhost:3000/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      BROWSERLESS_WS_ENDPOINT: 'ws://localhost:3000'
      PLAYWRIGHT_HEADLESS: 'true'
      PLAYWRIGHT_IGNORE_HTTPS_ERRORS: 'true'
      ORDER_POLL_WITHIN_DAYS: '7'
      ORDER_POLL_PLATFORMS: 'minne,creema'

      # Google Sheets
      GOOGLE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_BASE64 }}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}

      # Google OAuth（Gmail + Sheets refresh token 用）
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GOOGLE_SHEETS_REFRESH_TOKEN: ${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}

      # プラットフォーム認証
      MINNE_EMAIL: ${{ secrets.MINNE_EMAIL }}
      CREEMA_EMAIL: ${{ secrets.CREEMA_EMAIL }}
      CREEMA_PASSWORD: ${{ secrets.CREEMA_PASSWORD }}

      # Slack 通知（任意）
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # playwright install 不要: ブラウザはサービスコンテナ内で動作

      - name: Run order polling
        run: npx tsx scripts/poll-orders.ts --once
